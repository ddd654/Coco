<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    /* 자손결합자 */
    /* section li {
      color: blue;
    } */
    /* section span {
      color: red;
    } */

    /* 자손결합자 */
    section > ul > li {
      color: yellowgreen;
    }

    /* 일반 경합 선택자 */
    p ~ span {
      color: red;
    }
    p ~ code {
      font-size: 20px;
    }


    .first + li {
     color: aqua;
    }


  </style>

  <body>
    <section>
      <h1>헬스</h1>
      <p>우리 모두의 건강</p>
      <p>헬스는 기본적으로 건강을 가리킨다</p>
      <ul>
        <li>의료</li>
        <li>보건</li>
        <li>체력</li>
        <li>패션 헬스</li>
        <li>헬스클럽</li>
        <li>구글 <span>헬스</span></li>
      </ul>
    </section>

    <hr />

    <section>
      <span>이건 빨강이 아닙니다</span>
      <p>문단 구간</p>
      <code>코드 구간</code>
      <span>빨강 구간</span>
      <code>코드가 있어요</code>
      <span>red distruct, area</span>
    </section>

    <hr />

    <ul>
      <li class="first">one</li>
      <li>two</li>
      <li>three</li>
    </ul>
  </body>
</html>
