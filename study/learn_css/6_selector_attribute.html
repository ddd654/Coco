<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    h3[class] {
      font-size: 20px;
    }
    [target] {
      color: orange;
    }

    /* 속성 값과 일치하는 요소 */
    h3[class='naver_title'] {
      color: green;
    }

    /* 속성 값을 포함하는 요소 */
    a[href*='www'] {
      text-decoration: none;
    }

    /* 속성 값으로 시작하는 요소 */
    h3[class^='google'] {
      color: aquamarine;
    }

    /* 속성 값으로 끝나는 요소  */
    a[href$='face.com'] {
      color: red;
    }

    /* 속성에 단어가 포함하는 요소, 존재여부로 적용 */
    h3[class~='title'] {
      font-size: 30px;
      color: violet;
    }
  </style>
  <body>
    <h3 class="naver_title">네이버</h3>
    <a href="https://www.naver.com">네이버</a>
    <h3 class="google_title">구글</h3>
    <a href="https://www.google.com" target="blank">구글</a>
    <h3 class="face_title">페이스북</h3>
    <a href="https://www.face.com">페이스북</a>
    <h3 class="text title coco">감사합니다</h3>
  </body>
</html>
