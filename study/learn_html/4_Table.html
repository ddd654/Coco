<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    table {
      border: 1px solid black;
      border-collapse: collapse;
    }
    th,
    td {
      border: 1px solid green;
    }

    .col3{
      background-color: red;
    }



  </style>
  <body>
    <table>
      <caption>
        프로필 테이블
      </caption>
      <tr>
        <th>이름</th>
        <th>취미</th>
        <th>특기</th>
      </tr>
      <tr>
        <td>홍길동</td>
        <td>도술</td>
        <td>축지법</td>
      </tr>
      <tr>
        <td>코코</td>
        <td>날기</td>
        <td>피아노</td>
      </tr>
    </table>

    <hr />

    <h1>Table tag</h1>
    <table>
      <caption>
        학급 점수
      </caption>

      <colgroup>
        <col class="col1"/>
        <col class="col2"/>
        <col class="col3"/>
        <col class="col4"/>
        <col class="col5"/>
        <col class="col6"/>
      </colgroup>

      <tr>
        <th>반</th>
        <th>이름</th>
        <th>국어</th>
        <th>수학</th>
        <th>사회</th>
        <th>과학</th>
      </tr>
      <tr>
        <td>1반</td>
        <td>dodo</td>
        <td>10</td>
        <td>5</td>
        <td>1</td>
        <td>3</td>
      </tr>
      <tr>
        <td>2반</td>
        <td>coco</td>
        <td>10</td>
        <td>7</td>
        <td>1</td>
        <td>3</td>
      </tr>
      <tr>
        <td>3반</td>
        <td>soso</td>
        <td>10</td>
        <td>4</td>
        <td>1</td>
        <td>8</td>
      </tr>
    </table>]




  </body>
</html>
