<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <style>
    div {
      background-color: green;
    }
    span {
      background-color: red;
    }
  </style>

  <body>
    <div>
      coco
      <!--block레벨 요소-->
      <!--전체 공간을 차지, 세로-->
      
    </div>
    <span>
      coco
      <!--inline레벨 요소-->
      <!--해당 공간만 차지, 가로-->
    </span>
  </body>
</html>
