<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      
      <fieldset>
        <legend>input tag</legend>
        <ul>
          <li>
            <label for="text">textx</label>
            <input type="text" id="text" required value="coco" readonly></input>
          </li>
          <li>
            <label for="password">password</label>
            <input type="password" id="password" required value="coco" disabled></input>
          </li>
          <li>
            <label for="email">이메일</label>
            <input type="email" id="email" required autofocus></input>  
          </li>
          <li>
            <label for="url">url</label>
            <input type="url" id="url" required placeholder="url을 입력해주세요"></input>
          </li>
          <li>
            <label for="number">number</label>
            <input type="number" id="number" required ></input>
          </li>
          <li>
            <label for="number">number</label>
            <input type="number" id="number" required min="5" max="10"></input>
          </li>
          <li>
            <label for="range">range</label>
            <input type="range" id="range" required>
          </li>
          
        </ul>
      </fieldset>

      <fieldset>
        <legend>날짜관련</legend>
        <ul>
          <li>
            <label for="date">date</label>
            <input type="date" id="date" min="2023-02-10" max="2023-02-20">
          </li>
          <li>
            <label for="month">month</label>
            <input type="month" id="month" >
          </li>
          <li>
            <label for="week">week</label>
            <input type="week" id="week" >
          </li>
        </ul>
      </fieldset>

      <fieldset>
        <legend>시간관련</legend>
        <ul>
          <li>
            <label for="time">time</label>
            <input type="time" id="time" min="16:00" max="18:00">
          </li>
          <li>
            <input type="hidden" name="" value="f">
          </li>
        </ul>
      </fieldset>

      <fieldset>
        <legend>그 외</legend>
        <ul>
          <li>
            <input type="file" multiple>
          </li>
        </ul>
      </fieldset>

      <!--이 입력란을 작성하시오 라고 창이 뜬다-->
      <input type="submit" value="제출하기">
    </form>
  </body>
</html>
